<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeStation Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="vibe-bg-glow"></div>
    <div class="app-container">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <h1 class="brand-title">VibeStation</h1>
            <nav class="nav-menu">
                <button class="nav-item active" id="btn-show-library">
                    <svg class="nav-icon" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                    <span class="nav-label">Library</span>
                </button>
                <button class="nav-item" id="btn-show-albums">
                    <svg class="nav-icon" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
                    <span class="nav-label">Albums</span>
                </button>
                <button class="nav-item" id="btn-show-artists">
                    <svg class="nav-icon" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <span class="nav-label">Artists</span>
                </button>
                <button class="nav-item" id="btn-show-playlists">
                    <svg class="nav-icon" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zm-2-7h-8v2h8V9zm0 4h-8v2h8v-2zm0-8h-8v2h8V5z"/></svg>
                    <span class="nav-label">Playlists</span>
                </button>
                <button class="nav-item" id="btn-show-settings">
                    <svg class="nav-icon" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                    <span class="nav-label">Settings</span>
                </button>
                <input type="file" id="file-input" multiple accept="audio/mpeg" style="display: none;">
                <button class="nav-item" id="btn-upload">
                    <svg class="nav-icon" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                    <span class="nav-label">Upload Tracks</span>
                </button>
            </nav>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content">
            <header class="content-header">
                <h2 id="view-title">Your Collection</h2>
                <input type="text" id="search-bar" placeholder="Search tracks, artists...">
            </header>

            <div class="library-view">
                <div class="tracks-list" id="tracks-container">
                    <p class="status-msg">Scanning library folders...</p>
                </div>
            </div>
        </main>

        <!-- Floating Player Overlay -->
        <div class="player-bar">
            <canvas id="visualizer-canvas"></canvas>
            
            <div class="player-left">
                <div class="artwork-container">
                    <img id="current-art" src="placeholder.png" alt="Cover Art">
                </div>
                <div class="track-meta">
                    <div class="track-title" id="player-title">Not Playing</div>
                    <div class="track-artist" id="player-artist">Select a song from library</div>
                </div>
            </div>

            <div class="player-center">
                <div class="controls">
                    <button class="control-btn" id="btn-prev">
                        <svg viewBox="0 0 24 24" width="20" height="20" style="vertical-align: middle;"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                    </button>
                    <button class="control-btn play-btn" id="btn-play-pause">
                        <svg id="play-pause-svg" viewBox="0 0 24 24" width="16" height="16" style="vertical-align: middle;"><path fill="currentColor" id="play-pause-path" d="M8 5v14l11-7z"/></svg>
                    </button>
                    <button class="control-btn" id="btn-next">
                        <svg viewBox="0 0 24 24" width="20" height="20" style="vertical-align: middle;"><path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    </button>
                </div>
                <div class="timeline-container">
                    <span id="time-current">0:00</span>
                    <input type="range" id="seek-bar" min="0" max="100" value="0">
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <button class="fingerprint-btn" id="btn-fingerprint" title="Vibe Scanner">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M12,2C11.97,2 11.93,2 11.9,2C9.13,2.05 6.78,3.77 5.75,6.33C5.5,6.96 5.8,7.66 6.43,7.91C7.06,8.16 7.76,7.86 8,7.23C8.67,5.56 10.2,4.44 12,4.4C13.88,4.44 15.42,5.65 16.03,7.43C16.22,8.04 16.88,8.38 17.5,8.18C18.11,8 18.45,7.33 18.25,6.72C17.3,3.53 14.54,2.23 11.6,2.05C11.75,2.02 11.88,2 12,2M12,6C9.36,6 7.22,8.14 7.22,10.78V12.1C7.22,12.76 7.76,13.3 8.42,13.3C9.08,13.3 9.62,12.76 9.62,12.1V10.78C9.62,9.47 10.69,8.4 12,8.4C13.31,8.4 14.38,9.47 14.38,10.78V15.2C14.38,15.86 14.92,16.4 15.58,16.4C16.24,16.4 16.78,15.86 16.78,15.2V10.78C16.78,8.14 14.64,6 12,6M12,10C11.34,10 10.8,10.54 10.8,11.2V13.8C10.8,14.46 11.34,15 12,15C12.66,15 13.2,14.46 13.2,13.8V11.2C13.2,10.54 12.66,10 12,10M8.42,15.7C7.76,15.7 7.22,16.24 7.22,16.9C7.22,18.9 8.84,20.52 10.84,20.52H13.16C15.16,20.52 16.78,18.9 16.78,16.9V16C16.78,15.34 16.24,14.8 15.58,14.8C14.92,14.8 14.38,15.34 14.38,16V16.9C14.38,17.57 13.83,18.12 13.16,18.12H10.84C10.17,18.12 9.62,17.57 9.62,16.9C9.62,16.24 9.08,15.7 8.42,15.7M12,18.12C11.34,18.12 10.8,18.66 10.8,19.32V20.2C10.8,20.86 11.34,21.4 12,21.4C12.66,21.4 13.2,20.86 13.2,20.2V19.32C13.2,18.66 12.66,18.12 12,18.12Z"/>
                </svg>
            </button>

            <div class="player-right">
                <div class="volume-container">
                    <svg class="vol-icon" viewBox="0 0 24 24" width="16" height="16" style="vertical-align: middle; color: var(--text-muted);"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <input type="range" id="volume-bar" min="0" max="100" value="80">
                </div>
            </div>
        </div>
    </div>
    
    <audio id="audio-element" crossorigin="anonymous"></audio>
    
    <!-- Add to Playlist Modal -->
    <div id="playlist-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-playlist-modal">&times;</span>
            <h3>Add to Playlist</h3>
            <div id="modal-playlists-list" class="modal-list">
                <!-- Dynamically loaded playlists -->
            </div>
            <div class="modal-create-section">
                <input type="text" id="modal-playlist-name" placeholder="Create new playlist...">
                <button class="btn-primary" id="btn-modal-create-playlist">Create</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
